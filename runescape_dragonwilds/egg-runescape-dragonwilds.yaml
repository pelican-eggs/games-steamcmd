startup_commands:
  Default: './RSDragonwilds/Binaries/Linux/RSDragonwildsServer-Linux-Shipping -log -port={{SERVER_PORT}} -ini:Game:[/Script/Engine.GameSession]:MaxPlayers={{MAX_PLAYERS}}'
config:
  files:
    RSDragonwilds/Saved/Config/LinuxServer/DedicatedServer.ini:
      parser: ini
      find:
        '[/Script/Dominion.DedicatedServerSettings].OwnerId': '{{server.environment.OWNER_ID}}'
        '[/Script/Dominion.DedicatedServerSettings].ServerName': '{{server.environment.SERVER_NAME}}'
        '[/Script/Dominion.DedicatedServerSettings].DefaultWorldName': '{{server.environment.DEFAULT_WORLD_NAME}}'
        '[/Script/Dominion.DedicatedServerSettings].AdminPassword': '{{server.environment.ADMIN_PASSWORD}}'
        '[/Script/Dominion.DedicatedServerSettings].WorldPassword': '{{server.environment.WORLD_PASSWORD}}'
  startup:
    done: 'CREATE SESSION - Advertise'
  logs: {  }
  stop: ^C
scripts:
  installation:
    script: |-
      #!/bin/bash

      ## File: RuneScape Dragonwilds Egg - egg-runescape-dragonwilds.yaml
      ## Authors: David Wolfe (Red-Thirten)
      ## Date: 2026/04/23
      ## License: MIT License
      ## Image to install with is 'ghcr.io/pelican-eggs/installers:debian'

      # Download and install SteamCMD
      export HOME=/mnt/server
      cd /tmp
      mkdir -p $HOME/steamcmd $HOME/steamapps
      curl -sSL -o steamcmd.tar.gz https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
      tar -xzvf steamcmd.tar.gz -C $HOME/steamcmd
      cd $HOME/steamcmd

      # SteamCMD fails otherwise for some reason, even running as root.
      # This is changed at the end of the install process anyways.
      chown -R root:root /mnt

      # Install/Verify game server using SteamCMD
      ./steamcmd.sh +force_install_dir $HOME +login anonymous +app_update ${SRCDS_APPID} validate +quit

      # Set up 32 and 64 bit libraries
      mkdir -p $HOME/.steam/sdk{32,64}
      cp -v linux32/steamclient.so /mnt/server/.steam/sdk32/steamclient.so
      cp -v linux64/steamclient.so /mnt/server/.steam/sdk64/steamclient.so

      ## RuneScape Dragonwilds Setup
      # Check for successful installation & ensure binary is executable
      BINARY_DIR=$HOME/RSDragonwilds/Binaries/Linux
      BINARY_NAME=RSDragonwildsServer-Linux-Shipping
      if [[ -f $BINARY_DIR/$BINARY_NAME ]]; then
          chmod +x $BINARY_DIR/$BINARY_NAME
          echo -e "\nRuneScape Dragonwilds Dedicated Server successfully installed!\n"
          exit 0
      else
          echo -e "\n\nSteamCMD failed to install the RuneScape Dragonwilds Dedicated Server!"
          echo -e "\tTry reinstalling the server again.\n"
          exit 1
      fi
    container: 'ghcr.io/pelican-eggs/installers:debian'
    entrypoint: /bin/bash
