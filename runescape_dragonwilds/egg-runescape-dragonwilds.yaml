description: |-
  RuneScape: Dragonwilds is a co-op survival RPG set in the world of RuneScape. Up to 6 players can
  explore, craft, build, and battle together on a dedicated server. RAM recommendation is 2 GB base +
  1 GB per player (8 GB for a full 6-player server).
